<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Caza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-slate-900 text-slate-200 antialiased">

    <nav class="fixed top-0 w-full bg-slate-900/90 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center cursor-pointer">
                <span class="text-xl font-bold text-white">AeroWiki</span>
            </a>

            <div class="hidden md:block w-full max-w-md relative ml-auto mr-auto lg:ml-[250px] lg:mr-auto" id="search-bar-container">
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Buscar cazas..." 
                    class="w-full p-2 bg-slate-700/50 border border-slate-700 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition"
                />
                <div id="search-results" class="search-dropdown" style="display: none;">
                    </div>
            </div>

            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-sm font-medium text-white hover:text-blue-400 transition">Home</a>
                <a href="#" class="text-sm font-medium text-white hover:text-blue-400 transition">Clasificación</a>
                <a href="#" class="text-sm font-medium text-white hover:text-blue-400 transition">Historia</a>
            </div>
        </div>
    </nav>
    
    <div class="pt-24 pb-12 px-4 max-w-7xl mx-auto min-h-screen">
        
        <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
            
            <div class="relative h-64 md:h-96 w-full">
                <img id="detail-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
                <h1 id="detail-title" class="absolute bottom-6 left-6 text-4xl md:text-6xl font-bold text-white drop-shadow-lg"></h1>
            </div>

            <div class="p-6 md:p-10 grid grid-cols-1 lg:grid-cols-3 gap-10">
                
                <div class="lg:col-span-2 space-y-6 text-slate-300 leading-relaxed text-lg">
                    <p id="detail-desc" class="text-xl text-slate-100 font-medium"></p>
                    <hr class="border-slate-600 my-4">
                    <p id="detail-fulltext"></p>
                    
                    <div class="mt-10">
                        <h3 class="text-2xl font-bold text-white mb-4">Armamento</h3>
                        <div id="missiles-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </div>
                    
                    <div class="mt-8">
                        <h3 class="text-2xl font-bold text-white mb-4">En Acción</h3>
                        <div class="aspect-w-16 aspect-h-9 bg-black rounded-lg overflow-hidden h-96">
                            <video id="detail-video-player" class="w-full h-full object-cover" controls autoplay muted loop>
                                Tu navegador no soporta el formato de video MP4.
                            </video>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-700/50 p-6 rounded-xl h-fit border border-slate-600">
                    <h3 class="text-xl font-bold text-white mb-4 border-b border-slate-500 pb-2">Especificaciones</h3>
                    <ul class="space-y-4 text-sm">
                        <li class="flex justify-between"><span class="text-slate-400">Velocidad:</span> <span id="spec-speed" class="text-white font-mono"></span></li>
                        <li class="flex justify-between"><span class="text-slate-400">Alcance:</span> <span id="spec-range" class="text-white font-mono"></span></li>
                        <li class="flex justify-between"><span class="text-slate-400">Techo:</span> <span id="spec-ceiling" class="text-white font-mono"></span></li>
                        <li class="flex justify-between"><span class="text-slate-400">Tasa de ascenso:</span> <span id="spec-climb-rate" class="text-white font-mono"></span></li>
                        <li class="flex justify-between"><span class="text-slate-400">Origen:</span> <span id="spec-origin" class="text-white"></span></li>
                        <li class="border-t border-slate-600 pt-4 mt-4">
                            <div class="mb-3">
                                <h4 id="spec-engine-name" class="text-base font-bold text-blue-400"></h4>
                            </div>
                            <ul class="space-y-3">
                                <li class="flex justify-between"><span class="text-slate-400">Potencia por motor:</span> <span id="spec-power-per-engine" class="text-white font-mono"></span></li>
                                <li class="flex justify-between"><span class="text-slate-400">Potencia total (postquemador):</span> <span id="spec-total-power" class="text-white font-mono"></span></li>
                                <li class="flex justify-between"><span class="text-slate-400">Relación potencia/peso:</span> <span id="spec-power-weight" class="text-white font-mono"></span></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="missiles.js"></script>
    <script src="index.js"></script>
    <script src="caza.js"></script>
</body>
</html>
