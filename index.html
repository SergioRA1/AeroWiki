<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroWiki - Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-slate-900 text-slate-200 antialiased">

    <nav class="fixed top-0 w-full bg-slate-900/90 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center cursor-pointer">
                <span class="text-xl font-bold text-white">AeroWiki</span>
            </a>

            <div class="hidden md:block w-full max-w-md relative ml-auto mr-auto lg:ml-[250px] lg:mr-auto" id="search-bar-container">
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Buscar cazas..." 
                    class="w-full p-2 bg-slate-700/50 border border-slate-700 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition"
                />
                <div id="search-results" class="search-dropdown" style="display: none;">
                    </div>
            </div>

            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-sm font-medium text-white hover:text-blue-400 transition">Home</a>
                <a href="#" class="text-sm font-medium text-white hover:text-blue-400 transition">Clasificación</a>
                <a href="#" class="text-sm font-medium text-white hover:text-blue-400 transition">Historia</a>
            </div>
        </div>
    </nav>
    <div class="pt-24 pb-12 px-4 max-w-7xl mx-auto min-h-screen">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-white">Dominio Aéreo</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="jets-grid"></div>
    </div>

    <script src="data.js"></script>

    <script src="index.js"></script>
</body>
</html>
